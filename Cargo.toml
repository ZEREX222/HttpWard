edition = "2024"
rust-version = "1.93.1"

[workspace]
members = [
    "httpward",
    "httpward-docs",
    "httpward-core"
]

[workspace.dependencies]
tokio = { version = "1.49", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
hyper = { version = "1.8", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1.3"

resolver = "0.1.3"
