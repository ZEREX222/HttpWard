edition = "2024"
rust-version = "1.93.1"

[workspace]
members = [
    "httpward",
    "httpward-docs",
    "httpward-core"
]

[workspace.dependencies]
tokio = { version = "1.49", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }


resolver = "0.1.3"
