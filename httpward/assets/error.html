<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f1117;
color:#e6e6eb;
padding:20px;
text-align:center;
}

.container{
max-width:420px;
width:100%;
}

.code{
font-size:64px;
font-weight:700;
margin-bottom:10px;
color:#ffffff;
}

.title{
font-size:20px;
margin-bottom:10px;
color:#e6e6eb;
}

.desc{
font-size:14px;
line-height:1.5;
color:#9aa0b0;
}

.footer{
margin-top:20px;
font-size:12px;
color:#6b6f82;
}

@media (max-width:480px){

.code{
font-size:48px;
}

.title{
font-size:18px;
}

.desc{
font-size:13px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="code">{{e_num}}</div>

<div class="title">{{e_text}}</div>

<div class="desc">
{{e_desc}}
</div>

<div class="footer">httpward</div>

</div>

</body>
</html>
