<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{e_num}}</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --text-main: #ffffff;
            --text-dim: #666666;
            --accent: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            /* Soft glow in the center to create depth */
            background: radial-gradient(circle at center, #111112 0%, #0a0a0b 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: left; /* Switched to left alignment for a more "designer-like" look */
            max-width: 600px;
            padding: 40px;
        }

        .code {
            font-size: clamp(8rem, 20vw, 12rem); /* Huge adaptive font size */
            font-weight: 800;
            line-height: 0.8;
            letter-spacing: -0.05em;
            margin-bottom: 20px;
            opacity: 0.9;
            /* Outline text effect for styling */
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
        }

        .content {
            border-left: 2px solid var(--accent);
            padding-left: 30px;
            margin-left: 10px;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .desc {
            font-size: 16px;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 350px;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .content { padding-left: 20px; }
            .title { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="code">{{e_num}}</div>

    <div class="content">
        <h1 class="title">{{e_text}}</h1>
        <p class="desc">{{e_desc}}</p>
    </div>

    <div class="footer">httpward</div>
</div>

</body>
</html>
